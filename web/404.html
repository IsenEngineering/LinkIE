<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsenEngineering - Page introuvable</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #20396E;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: white;
            width: 100dvw;
            height: 100dvh;
            overflow: hidden;
            padding: 4em;

            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 32px;
            position: relative;

            background-image: linear-gradient(45deg, #20396E, #090909);
        }

        .fond {
            position: absolute;
            z-index: -10;
            width: 100%;
            height: 100%;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }
        
        .titre-404 {
            width: 64em;
            opacity: 0;
            animation: fadeFromLeft .5s ease-out 0.5s forwards;
        }

        section > img {
            opacity: 0;
            animation: fadeIn .5s ease-out 0.5s forwards;
        }

        @keyframes fadeFromLeft {
            from {
                opacity: 0;
                transform: translate(-12.5%, -6.25%);
            }
            to {
                opacity: 1;
                transform: translate(0, 0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        h1 {
            font-size: clamp(20px, 4vw, 32px);
            text-transform: uppercase;
            font-weight: 900;
            color: var(--text);
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        p {
            font-size: clamp(14px, 2vw, 16px);
            font-weight: 300;
            color: #FFF8;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.7s forwards;
        }

        a {
            padding: 12px 32px;

            background: #FFF1;
            color: white;
            border: 1px solid var(--primary);

            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            
            opacity: 0;
            animation: fadeIn 1s ease-out 0.9s forwards;
            transition: background .3s ease, border-color .3s ease;
        }

        a:hover {
            background: hsl(222, 50%, 25%);
            border-color: #FFF1;
        }


        nav{
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        @media (width < 1200px) {
            body {
                padding: 1em;
                gap: 64px;
                flex-direction: column;
            }
            .titre-404 {
                width: 100%;
            }
            section > img {
                display: none;
            }
        }
        
    </style>
</head>
<body>

        <defs>
            <pattern id="a" width="50" height="50" patternUnits="userSpaceOnUse">
                <path fill="none" stroke="#fff2" stroke-linecap="square" stroke-width=".5" d="M8.25 10h13.5M15 3.25v13.5"/>
            </pattern>
        </defs>
        <rect width="500%" height="500%" fill="url(#a)"/>
    </svg>

    <svg class="titre-404" viewBox="0 0 1011 391" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 322V247L151 5H223V111H182L100 240V243H323V322H0ZM183 380V298L185 263V5H278V380H183Z" fill="white"/>

        <path d="M688 322V243L839 5H910V111H869L788 240V243H1011V322H688ZM870 380V298L872 263V5H968V380H870Z" fill="white"/>

        <img src="https://link-ie.isenengineering.fr/assets/ie-sm.png" alt="Logo IsenEngineering" width="128" height="128">

</html>
