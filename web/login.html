<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkIE - Connexion</title>
    <link rel="stylesheet" href="/assets/output.css">
    <link rel="shortcut icon" href="/assets/fav.png" type="image/png">
</head>
<body class="w-screen h-screen flex flex-col gap-8 justify-center items-center
    bg-linear-to-tr from-ie to-sombre">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full absolute -z-10 top-0 left-0">
        <defs>
            <pattern id="a" width="50" height="50" patternUnits="userSpaceOnUse">
                <path fill="none" stroke="#fff2" stroke-linecap="square" stroke-width=".5" d="M8.25 10h13.5M15 3.25v13.5"/>
            </pattern>
        </defs>
        <rect width="500%" height="500%" fill="url(#a)"/>
    </svg>
    <div class="w-full px-8 sm:w-xl lg:px-0 space-y-4">
        <h1 class="font-bold text-6xl leading-12 uppercase text-left">
            Link-IE
        </h1>
        <p class="text-lg italic text-white/75">
            La plateforme qui vous permet de gérer les redirections de l'IsenEngineering
        </p>
    </div>

    <a class="flex flex-row gap-2 p-3 font-semibold rounded-full cursor-pointer select-none
        bg-white hover:bg-white/75 text-sombre transition-colors"
        href="/auth/login">
        <img src="/assets/google.svg" alt="Logo Google" width="24" height="24">
        Connexion avec Google
    </a>

    <a href="https://github.com/IsenEngineering/LinkIE" target="_blank" class="absolute bottom-4 right-4 flex-row gap-2 flex
        items-center px-3 py-2  hover:bg-pink-400/75
        transition-colors cursor-pointer rounded-full">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19.414 14.414C21 12.828 22 11.5 22 9.5a5.5 5.5 0 0 0-9.591-3.676.6.6 0 0 1-.818.001A5.5 5.5 0 0 0 2 9.5c0 2.3 1.5 4 3 5.5l5.535 5.362a2 2 0 0 0 2.879.052 2.12 2.12 0 0 0-.004-3 2.124 2.124 0 1 0 3-3 2.124 2.124 0 0 0 3.004 0 2 2 0 0 0 0-2.828l-1.881-1.882a2.41 2.41 0 0 0-3.409 0l-1.71 1.71a2 2 0 0 1-2.828 0 2 2 0 0 1 0-2.828l2.823-2.762"/>
        </svg>
        Participer au développement
    </a>
</body>
</html>
